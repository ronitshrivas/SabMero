services:
  db:
    image: postgres:16
    container_name: sabmero-db
    restart: always
    environment:
      POSTGRES_USER: sabmero
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: SabmeroDb
    volumes:
      - sabmero_pgdata:/var/lib/postgresql/data
    networks:
      - sabmero_net
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sabmero-api
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: "postgresql://sabmero:${DB_PASSWORD}@db:5432/SabmeroDb"
      JWT_SECRET: ${JWT_SECRET}
      ASPNETCORE_ENVIRONMENT: Production
      Brevo__ApiKey: ${BREVO_API_KEY}
    ports:
      - "8080:8080"
    networks:
      - sabmero_net
networks:
  sabmero_net:
volumes:
  sabmero_pgdata: